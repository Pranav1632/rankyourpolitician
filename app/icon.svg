<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Same mark as the header logo: parliament glyph on the brand gradient
       tile (from-brand #4f46e5 to brand-deep #312e81, rounded-xl = 1/3 radius).
       Stroke slightly heavier than the header's 1.9 so it stays legible at
       16px tab size. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="21" fill="url(#g)"/>
  <g transform="translate(14.2 14.2) scale(1.48)" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 21h18M4 21V10m16 11V10M4 10l8-5 8 5M8 21v-6m4 6v-6m4 6v-6"/>
